name: Build and Push Docker Image

on:
  push:
    branches: [ main, master, principal ]   # déclenche sur ces branches
  pull_request:
    branches: [ main, master, principal ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}   # doit être "377aicha"
          password: ${{ secrets.DOCKER_PASSWORD }}   # ton Access Token Docker Hub
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            377aicha/chat:latest
            377aicha/chat:${{ github.sha }}
