services:
  # Base de données MySQL
  db:
    image: mysql:8.0
    container_name: chat_mysql_db
    environment:
      MYSQL_DATABASE: chatdb
      MYSQL_USER: chatuser
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - chat_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "chatuser", "-ppassword"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Service de chat 1
  chat1:
    build: .
    container_name: chat_service_1
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql+pymysql://chatuser:password@db:3306/chatdb
      SERVICE_NAME: chat_service_1
      SERVICE_PORT: "5000"
      OTHER_SERVICE_URL: http://chat_service_2:5001
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chat_network
    restart: unless-stopped
    volumes:
      - ./templates:/app/templates
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Service de chat 2
  chat2:
    build: .
    container_name: chat_service_2
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: mysql+pymysql://chatuser:password@db:3306/chatdb
      SERVICE_NAME: chat_service_2
      SERVICE_PORT: "5001"
      OTHER_SERVICE_URL: http://chat_service_1:5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chat_network
    restart: unless-stopped
    volumes:
      - ./templates:/app/templates
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:

networks:
  chat_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
